<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Angga Digital Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

/* NAVBAR */

nav{
    background:#111;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 50px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

/* HERO */

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:50px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    margin-bottom:20px;
}

.btn{
    background:green;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:8px;
}

/* PRODUK */

.produk{
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

.produk h2{
    text-align:center;
    margin-bottom:30px;
}

.card-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:white;
    width:300px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    margin-bottom:15px;
}

/* FORM */

.kontak{
    max-width:600px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

.kontak h2{
    margin-bottom:20px;
    text-align:center;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

button{
    background:green;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
}

/* FOOTER */

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

/* tombol whatsapp mengambang */
.whatsapp{
    position:fixed;
    right:20px;
    bottom:20px;

    background:#25D366;
    color:white;

    text-decoration:none;
    padding:15px 20px;

    border-radius:50px;

    font-weight:bold;
}

@media (max-width: 768px){

    nav{
        flex-direction:column;
        gap:15px;
        padding:20px;
    }

    nav div{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero h1{
        font-size:35px;
    }

    .hero p{
        font-size:18px;
    }

    .card{
        width:100%;
    }

}

</style>

</head>

<body>

<nav>

<h2>Angga Store</h2>

<div>
<a href="#">Home</a>
<a href="#">Produk</a>
<a href="#">Kontak</a>
</div>

</nav>

<section class="hero">

<h1>Belajar Cari Uang dari Produk Digital</h1>

<p>
Jual ebook dan produk digital berkualitas.
</p>

<a href="#" class="btn">
Beli Sekarang
</a>

</section>

<section class="produk">

<h2>Produk Digital</h2>

<div class="card-container">

<div class="card">

<img src="images/ebook.jpg" alt="Ebook">

<h3>Ebook Bisnis</h3>

<p>
Belajar bisnis digital dari nol.
</p>

<a
href="https://wa.me/6281234567890?text=Saya%20tertarik%20dengan%20Ini"
class="btn"
>
Beli Via WhatsApp
</a>

</div>

</div>

</section>

<section class="kontak">

<h2>Hubungi Kami</h2>

<form>

<input
type="text"
placeholder="Nama Kamu"
>

<input
type="email"
placeholder="Email Kamu"
>

<textarea
rows="5"
placeholder="Tulis pesan..."
></textarea>

<button type="submit">
Kirim Pesan
</button>

</form>

</section>

<footer>

© 2026 Angga Digital Store

</footer>

<a
href="https://wa.me/6281234567890"
class="whatsapp"
>
WhatsApp
</a>

</body>
</html>
